<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="#1a1a1a">
    <!-- 5 rounded petals, each rotated 72° around center -->
    <path d="M50,46 C38,42 31,20 42,8 C45,4 55,4 58,8 C69,20 62,42 50,46Z"/>
    <path d="M50,46 C38,42 31,20 42,8 C45,4 55,4 58,8 C69,20 62,42 50,46Z" transform="rotate(72,50,50)"/>
    <path d="M50,46 C38,42 31,20 42,8 C45,4 55,4 58,8 C69,20 62,42 50,46Z" transform="rotate(144,50,50)"/>
    <path d="M50,46 C38,42 31,20 42,8 C45,4 55,4 58,8 C69,20 62,42 50,46Z" transform="rotate(216,50,50)"/>
    <path d="M50,46 C38,42 31,20 42,8 C45,4 55,4 58,8 C69,20 62,42 50,46Z" transform="rotate(288,50,50)"/>
    <!-- Center -->
    <circle cx="50" cy="50" r="11"/>
    <!-- Small stamen dots in white -->
    <circle cx="50" cy="42" r="1.8" fill="white"/>
    <circle cx="55" cy="45" r="1.8" fill="white"/>
    <circle cx="54" cy="51" r="1.8" fill="white"/>
    <circle cx="46" cy="51" r="1.8" fill="white"/>
    <circle cx="45" cy="45" r="1.8" fill="white"/>
  </g>
  <style>
    g { fill: #1a1a1a; }
    @media (prefers-color-scheme: dark) {
      g { fill: #fff; }
    }
  </style>
</svg>
