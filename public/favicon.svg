<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .petal { fill: #1a1a1a; }
    .center { fill: #fff; }
    @media (prefers-color-scheme: dark) {
      .petal { fill: #fff; }
      .center { fill: #1a1a1a; }
    }
  </style>
  <!-- Each petal starts 8 units from center so petals are clearly separate -->
  <g transform="translate(50,50)">
    <path class="petal" d="M-4,-8 C-18,-12 -20,-28 0,-40 C20,-28 18,-12 4,-8Z" transform="rotate(0)"/>
    <path class="petal" d="M-4,-8 C-18,-12 -20,-28 0,-40 C20,-28 18,-12 4,-8Z" transform="rotate(72)"/>
    <path class="petal" d="M-4,-8 C-18,-12 -20,-28 0,-40 C20,-28 18,-12 4,-8Z" transform="rotate(144)"/>
    <path class="petal" d="M-4,-8 C-18,-12 -20,-28 0,-40 C20,-28 18,-12 4,-8Z" transform="rotate(216)"/>
    <path class="petal" d="M-4,-8 C-18,-12 -20,-28 0,-40 C20,-28 18,-12 4,-8Z" transform="rotate(288)"/>
    <!-- Center dot covers the petal bases and provides contrast -->
    <circle class="center" r="10"/>
  </g>
</svg>
